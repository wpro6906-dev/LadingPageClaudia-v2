kind = "web"
previewPath = "/"
title = "Claudia Alzate Realtor®"
version = "1.0.0"
id = "artifacts/claudia-alzate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23627

[services.development]
run = "pnpm --filter @workspace/claudia-alzate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/claudia-alzate", "run", "build" ]
publicDir = "artifacts/claudia-alzate/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23627"
BASE_PATH = "/"
